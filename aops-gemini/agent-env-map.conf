# Agent environment variable mappings for headless sessions.
#
# Two formats supported:
#   TARGET=SOURCE     — set TARGET to the value of $SOURCE from parent env.
#                       Skipped if SOURCE is not set.
#   TARGET:=VALUE     — set TARGET to the literal VALUE.
#                       Use empty VALUE (TARGET:=) to unset/clear a variable.
#
# Lines starting with # are comments. Blank lines are ignored.
#
# This file is the single source of truth for credential isolation
# and env var forwarding to agent subprocesses. It is read by:
#   - lib/agent_env.py (shared library)
#   - hooks/session_env_setup.py (Claude CLAUDE_ENV_FILE persistence)
#   - tests/conftest.py (headless test harness)

# --- Credential isolation (issue #581) ---
# Agents must use the bot PAT, not the user's personal GitHub credentials.
# GH_TOKEN is the primary env var for the gh CLI (takes precedence over GITHUB_TOKEN).
# GITHUB_TOKEN is also set for broader tool compatibility (Actions, some SDKs).
# AOPS_BOT_GH_TOKEN is forwarded as itself so the container entrypoint can
# read it directly (e.g. for git credential helpers).
GH_TOKEN=AOPS_BOT_GH_TOKEN
GITHUB_TOKEN=AOPS_BOT_GH_TOKEN
AOPS_BOT_GH_TOKEN=AOPS_BOT_GH_TOKEN

# --- Anthropic / Claude Code auth (task-ebc758fd) ---
# Forwarded into polecat containers so headless `claude` can authenticate.
# Empty-string source is treated as unset to prevent the empty-key 401 leak
# (host shell exporting `ANTHROPIC_API_KEY=""` would otherwise pre-empt the
# container's OAuth file fallback).
ANTHROPIC_API_KEY=ANTHROPIC_API_KEY
CLAUDE_CODE_OAUTH_TOKEN=CLAUDE_CODE_OAUTH_TOKEN

# --- Gemini auth & runtime ---
# Same forwarding contract as Claude. GEMINI_CLI_HOME is the container HOME
# (used by gemini to find ~/.gemini/...) — kept in sync with container_home
# in polecat/cli.py.
GEMINI_API_KEY=GEMINI_API_KEY
GEMINI_SESSION_ID=GEMINI_SESSION_ID
GEMINI_CLI_HOME:=/home/worker

# --- Terminal capability (interactive sessions) ---
COLORTERM=COLORTERM
FORCE_COLOR=FORCE_COLOR
NO_COLOR=NO_COLOR

# --- Non-interactive signals ---
# Suppress prompts, pagers, and progress spinners in containers.
CI=CI
NONINTERACTIVE=NONINTERACTIVE

# --- Runtime config ---
ENFORCER_TOOL_CALL_THRESHOLD=ENFORCER_TOOL_CALL_THRESHOLD

# --- Git askpass disable (defence-in-depth) ---
# /usr/bin/true makes git refuse to prompt for credentials. Always-on inside
# polecat containers, regardless of whether a token is also forwarded.
GIT_ASKPASS:=true

# --- Gate modes ---
# Disable hydration gate friction framework-wide (aops-c255c989).
HYDRATION_GATE_MODE:=off

# --- Git Identity (bot identity) ---
GIT_AUTHOR_NAME:=polecat
GIT_AUTHOR_EMAIL:=aops-polecat@users.noreply.github.com
GIT_COMMITTER_NAME:=aops-polecat
GIT_COMMITTER_EMAIL:=aops-polecat@users.noreply.github.com

# --- PKB MCP Transport ---
# Forward PKB_MCP_URL and PKB_MCP_TOKEN to agents if set in the host environment.
# These are used to connect to the canonical PKB MCP server over HTTP/SSE.
# Empty source is skipped (treated as unset).
PKB_MCP_URL=PKB_MCP_URL
PKB_MCP_TOKEN=PKB_MCP_TOKEN

# --- SSH isolation ---
# Disconnect agent from user's SSH agent so git operations can't use personal keys.
# Forces git to use HTTPS + GH_TOKEN instead of SSH.
#
# SSH_AUTH_SOCK="" alone is NOT sufficient on macOS — keys stored in the
# Keychain are accessible directly by the ssh binary without ssh-agent.
# GIT_SSH_COMMAND=false ensures git never successfully authenticates via SSH.
# The insteadOf rewrite forces all github.com URLs to HTTPS so GH_TOKEN is used.
SSH_AUTH_SOCK:=
GIT_SSH_COMMAND:=false
GIT_TERMINAL_PROMPT:=0

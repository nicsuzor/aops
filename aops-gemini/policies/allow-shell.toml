# academicOps: Pre-authorize shell for autonomous workers
#
# Allow run_shell_command to execute without interactive confirmation.
# Priority 50 allows higher-priority deny rules (like extension protection)
# to still take precedence if they use a higher priority (e.g., 100).
[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 50
description = "Allow autonomous workers to run shell commands"

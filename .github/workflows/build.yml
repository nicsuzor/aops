name: Build AOPS Extension

# ============================================================================
# DEPLOYMENT TARGET: nicsuzor/aops — copy this file to:
#   nicsuzor/aops/.github/workflows/build.yml
#
# It is fired by a repository_dispatch from nicsuzor/academicOps's
# build-extension.yml workflow. It checks out academicOps (public) and
# nicsuzor/mem release binaries (public), builds, then commits and releases
# on itself using the repo's own GITHUB_TOKEN. No PAT required here.
# ============================================================================

on:
  repository_dispatch:
    types: [build-aops-extension]
  workflow_dispatch:
    inputs:
      ref:
        description: 'academicOps ref (tag, branch, or sha) to build from'
        required: false
        default: 'main'
      release_type:
        description: 'stable or testing'
        required: false
        default: 'stable'
        type: choice
        options: [stable, testing]

concurrency:
  group: build-aops-extension
  cancel-in-progress: true

jobs:
  download-pkb-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_label: x86_64-linux
            output_name: pkb-linux-x86_64
          - artifact_label: aarch64-darwin
            output_name: pkb-macos-aarch64
    runs-on: ubuntu-latest
    steps:
      - name: Determine mem release tag
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(gh api repos/nicsuzor/mem/releases --jq '
            [.[] | select(.assets | length > 0)] | .[0].tag_name // ""
          ')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "::error::No mem release found with binary assets"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE="mem-${TAG}-${{ matrix.artifact_label }}.tar.gz"
          gh release download "$TAG" --repo nicsuzor/mem --pattern "$ARCHIVE"
          mkdir -p output
          tar xzf "$ARCHIVE" -C output
          chmod +x output/pkb
          ls -la output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output_name }}
          path: output/pkb
          if-no-files-found: error

  build-and-deploy:
    needs: download-pkb-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push to self + create release on self
    steps:
      - name: Resolve dispatch inputs
        id: ctx
        run: |
          REF="${{ github.event.client_payload.ref || inputs.ref || 'main' }}"
          RTYPE="${{ github.event.client_payload.release_type || inputs.release_type || 'stable' }}"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "release_type=$RTYPE" >> "$GITHUB_OUTPUT"
          echo "Building academicOps@$REF as $RTYPE"

      - name: Checkout academicOps source
        uses: actions/checkout@v4
        with:
          repository: nicsuzor/academicOps
          ref: ${{ steps.ctx.outputs.ref }}
          fetch-depth: 0
          path: source

      - name: Checkout aops (self) for publish
        uses: actions/checkout@v4
        with:
          path: dist-repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: source
        run: uv sync --frozen

      - name: Get project version
        id: version
        working-directory: source
        run: |
          chmod +x scripts/version.py
          BASE_VERSION=$(uv run python scripts/version.py --get)
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ steps.ctx.outputs.release_type }}" = "testing" ]; then
            if [[ "$BASE_VERSION" == *-dev.* ]]; then
              VERSION="${BASE_VERSION}.${{ github.run_number }}"
            else
              CLEAN_VERSION=$(echo "$BASE_VERSION" | sed -E 's/([-+\.]dev|[-+]).*//')
              VERSION="${CLEAN_VERSION}-dev.${{ github.run_number }}"
            fi
          else
            VERSION="$BASE_VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION (base: $BASE_VERSION)"

      - name: Download PKB binaries
        uses: actions/download-artifact@v4
        with:
          path: source/pkb-binaries/

      - name: Check if version changed
        id: check_version
        run: |
          if [ "${{ steps.ctx.outputs.release_type }}" = "testing" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            echo "Testing build: always deploy"
          else
            DIST_VERSION=""
            if [ -f dist-repo/aops-claude/.claude-plugin/plugin.json ]; then
              DIST_VERSION=$(python3 -c "import json; print(json.load(open('dist-repo/aops-claude/.claude-plugin/plugin.json'))['version'])" 2>/dev/null || true)
            fi
            if [ -n "$DIST_VERSION" ] && [ "$DIST_VERSION" = "${{ steps.version.outputs.version }}" ]; then
              echo "version_changed=false" >> "$GITHUB_OUTPUT"
              echo "Version unchanged ($DIST_VERSION), skipping build"
            else
              echo "version_changed=true" >> "$GITHUB_OUTPUT"
              echo "Version changed: ${DIST_VERSION:-<none>} -> ${{ steps.version.outputs.version }}"
            fi
          fi

      - name: Build platform-specific distributions
        if: steps.check_version.outputs.version_changed == 'true'
        working-directory: source
        env:
          ACA_DATA: ${{ github.workspace }}/source
        run: |
          VERSION_FLAG=""
          if [ "${{ steps.ctx.outputs.release_type }}" = "testing" ]; then
            VERSION_FLAG="--set-version ${{ steps.version.outputs.version }}"
          fi

          for platform_dir in pkb-binaries/pkb-*; do
            ARTIFACT_NAME=$(basename "$platform_dir")
            PLATFORM_LABEL="${ARTIFACT_NAME#pkb-}"
            echo "Building with PKB binary: $ARTIFACT_NAME ($PLATFORM_LABEL)"
            # shellcheck disable=SC2086
            uv run python scripts/build.py \
              --pkb-binary "$platform_dir/pkb" \
              --target-platform "$PLATFORM_LABEL" \
              $VERSION_FLAG
          done

          echo "Building generic (no PKB binary) distribution"
          # shellcheck disable=SC2086
          uv run python scripts/build.py $VERSION_FLAG

      - name: Sync dist into self and commit
        if: steps.check_version.outputs.version_changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TYPE: ${{ steps.ctx.outputs.release_type }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          rsync -a --delete source/dist/aops-claude/  dist-repo/aops-claude/
          rsync -a --delete source/dist/aops-cowork/  dist-repo/aops-cowork/
          rsync -a --delete source/dist/aops-gemini/  dist-repo/aops-gemini/
          cp source/dist/aops-gemini/gemini-extension.json dist-repo/gemini-extension.json

          mkdir -p dist-repo/.claude-plugin
          cp source/dist/.claude-plugin/marketplace.json dist-repo/.claude-plugin/marketplace.json

          cd dist-repo
          COMMIT_PREFIX="Release"
          if [ "$RELEASE_TYPE" = "testing" ]; then
            COMMIT_PREFIX="Testing release"
          fi
          git add -A
          git commit -m "chore: $COMMIT_PREFIX v$VERSION" || echo "No changes to commit"
          git push origin HEAD

      - name: Create GitHub Release on self
        if: steps.check_version.outputs.version_changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TYPE: ${{ steps.ctx.outputs.release_type }}
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$RELEASE_TYPE" = "testing" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          ARCHIVES=""
          for f in source/dist/*.tar.gz; do
            [ -f "$f" ] && ARCHIVES="$ARCHIVES $f"
          done

          if [ -n "$ARCHIVES" ]; then
            # shellcheck disable=SC2086
            gh release upload "v$VERSION" $ARCHIVES --clobber \
              || gh release create "v$VERSION" \
                --title "v$VERSION" \
                --notes "AcademicOps v$VERSION" \
                $PRERELEASE_FLAG \
                $ARCHIVES
          fi

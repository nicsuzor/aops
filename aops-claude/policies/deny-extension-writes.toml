# academicOps: Protect extension files from being modified by the agent
#
# Priority semantics: higher number wins (Gemini CLI policy engine).
# These rules use priority=100 so they override the sandbox allow rules
# (priority=50 in sandbox.toml), ensuring extension/config files remain
# protected even inside a worktree sandbox session.
# Ref: https://cloud.google.com/gemini/docs/codeassist/policy-engine
[[rule]]
toolName = "write_file"
argsPattern = ".*\\.gemini/extensions/.*"
decision = "deny"
priority = 100
denyMessage = "Modifying extension files is prohibited to ensure framework integrity."

[[rule]]
toolName = "replace"
argsPattern = ".*\\.gemini/extensions/.*"
decision = "deny"
priority = 100
denyMessage = "Modifying extension files is prohibited to ensure framework integrity."

# Protect other configuration files
[[rule]]
toolName = "write_file"
argsPattern = ".*\\.claude/.*\\.json"
decision = "deny"
priority = 100
denyMessage = "Modifying Claude configuration files is prohibited."

[[rule]]
toolName = "replace"
argsPattern = ".*\\.claude/.*\\.json"
decision = "deny"
priority = 100
denyMessage = "Modifying Claude configuration files is prohibited."

# Protect Gemini configuration
[[rule]]
toolName = "write_file"
argsPattern = ".*\\.gemini/settings\\.json"
decision = "deny"
priority = 100
denyMessage = "Modifying Gemini settings.json is prohibited."

[[rule]]
toolName = "replace"
argsPattern = ".*\\.gemini/settings\\.json"
decision = "deny"
priority = 100
denyMessage = "Modifying Gemini settings.json is prohibited."

# Protect shell access to extension files
[[rule]]
toolName = "run_shell_command"
commandRegex = ".*\\.gemini/extensions/.*"
decision = "deny"
priority = 100
denyMessage = "Modification of Gemini extensions via shell is prohibited."
